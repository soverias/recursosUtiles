@if (participants().length === 0) {
  <p>Sin participantes</p>
} @else {
  <ul>
    @for (p of participants(); track p.id) {
      <li>
        <span>{{ p.name }}</span>
        <button (click)="onRemove(p.id)" [attr.aria-label]="'Eliminar ' + p.name">×</button>
      </li>
    }
  </ul>
}
<div>
  <input
    [value]="newName()"
    (input)="newName.set($any($event.target).value)"
    placeholder="Nombre"
    aria-label="Nombre del participante"
  />
  <button data-add [disabled]="!newName().trim()" (click)="onAdd()">Añadir</button>
</div>
