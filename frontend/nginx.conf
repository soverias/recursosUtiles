server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Hashed static assets — cache aggressively (any path)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sub-apps — each has its own SPA fallback inside its scope
    location /secret-friend/ {
        try_files $uri $uri/ /secret-friend/index.html;
    }
    location /calculator/ {
        try_files $uri $uri/ /calculator/index.html;
    }
    location /bang-game/ {
        try_files $uri $uri/ /bang-game/index.html;
    }
    location /password-generator/ {
        try_files $uri $uri/ /password-generator/index.html;
    }

    # Store (catalog) at root — catch-all last
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache HTML or service worker manifest (any app)
    location ~* /(index\.html|ngsw\.json|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
