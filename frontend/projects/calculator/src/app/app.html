<div class="calc-root">
  <app-header (menuToggle)="sidebarOpen.update(v => !v)" />

  <div class="flex flex-1 overflow-hidden justify-center">
    <div class="flex w-full max-w-2xl">

    <!-- Overlay móvil -->
    @if (sidebarOpen()) {
      <div
        class="fixed inset-0 z-20 lg:hidden"
        style="background:rgba(0,0,0,0.7);backdrop-filter:blur(2px)"
        (click)="sidebarOpen.set(false)">
      </div>
    }

    <!-- Sidebar de categorías -->
    <app-category-sidebar
      [categories]="categories"
      [activeCategory]="activeCategory()"
      [collapsed]="sidebarCollapsed()"
      [mobileOpen]="sidebarOpen()"
      (categoryChange)="onCategoryChange($event)"
      (toggleCollapse)="sidebarCollapsed.update(v => !v)"
      (close)="sidebarOpen.set(false)" />

    <!-- Contenido principal -->
    <main class="flex-1 flex flex-col min-w-0 overflow-y-auto">
      <div class="flex flex-col p-4 gap-4 w-full max-w-sm mx-auto">
        <app-display
          [expression]="expression()"
          [result]="result()"
          [error]="error()" />

        <app-unit-selector
          [activeCategory]="activeCategory()"
          [outputUnit]="outputUnit()"
          [currentUnits]="quickUnits()"
          (outputUnitChange)="onOutputUnitChange($event)" />

        <app-keypad
          [quickUnits]="quickUnits()"
          (keyPress)="onKeyPress($event)" />
      </div>

      <app-history-panel
        [entries]="historyEntries()"
        (entrySelected)="onEntrySelected($event)"
        (clearHistory)="onClearHistory()" />
    </main>

    </div><!-- /max-w-2xl -->
  </div>

  <app-toast-outlet />
</div>
