<a
  [href]="tool().url"
  target="_blank"
  rel="noopener noreferrer"
  class="group block rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all duration-200 hover:-translate-y-1 hover:shadow-xl"
>
  <div class="mb-3 flex items-center gap-3">
    <span
      class="flex h-10 w-10 items-center justify-center rounded-lg text-xl"
      [style.background-color]="tool().color + '20'"
    >
      {{ tool().icon }}
    </span>
    <h3 class="font-semibold text-slate-900">{{ tool().name }}</h3>
  </div>

  <p class="text-sm leading-relaxed text-slate-600">
    {{ tool().description }}
  </p>

  <div
    class="mt-4 h-1 w-0 rounded-full transition-all duration-300 group-hover:w-full"
    [style.background-color]="tool().color"
  ></div>
</a>
