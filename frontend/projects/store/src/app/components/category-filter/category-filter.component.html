<div class="flex flex-wrap gap-2">
  <button
    [attr.aria-pressed]="active() === null"
    (click)="select(null)"
    class="rounded-full px-4 py-1.5 text-sm font-medium transition-colors"
    [class.bg-slate-900]="active() === null"
    [class.text-white]="active() === null"
    [class.bg-slate-100]="active() !== null"
    [class.text-slate-700]="active() !== null"
  >
    Todas
  </button>

  @for (cat of categories(); track cat) {
    <button
      [attr.aria-pressed]="active() === cat"
      (click)="select(cat)"
      class="rounded-full px-4 py-1.5 text-sm font-medium transition-colors"
      [class.bg-slate-900]="active() === cat"
      [class.text-white]="active() === cat"
      [class.bg-slate-100]="active() !== cat"
      [class.text-slate-700]="active() !== cat"
    >
      {{ cat }}
    </button>
  }
</div>
