<div class="fixed inset-0 bg-indigo-900/95 flex items-center justify-center p-4 z-50">
  <div class="max-w-sm w-full text-center">
    <p class="text-indigo-300 text-sm mb-2">{{ giverName() }}, te toca regalar a...</p>

    @if (showing()) {
      <div class="bg-white rounded-3xl p-8 shadow-2xl">
        <div class="text-6xl mb-4">🎁</div>
        <p class="text-4xl font-bold text-indigo-700">{{ receiverName() }}</p>
        <p class="text-gray-400 text-sm mt-4">¡Recuerda no decírselo a nadie!</p>
        <button
          (click)="close()"
          class="mt-6 w-full py-3 rounded-2xl bg-indigo-100 text-indigo-700 font-medium
                 hover:bg-indigo-200 active:scale-95 transition-all text-sm"
        >
          Ocultar
        </button>
      </div>
    } @else {
      <button
        data-reveal
        (click)="reveal()"
        class="w-full py-6 rounded-3xl bg-white text-indigo-700 font-bold text-2xl
               hover:bg-indigo-50 active:scale-95 transition-all shadow-2xl"
      >
        Ver a quién me toca 👀
      </button>
    }
  </div>
</div>
