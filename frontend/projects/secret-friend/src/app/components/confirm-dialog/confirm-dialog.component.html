@if (open()) {
  <div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
    <div role="dialog" class="bg-white rounded-3xl shadow-xl max-w-sm w-full p-8 text-center">
      <div class="text-5xl mb-4">🤫</div>
      <h2 class="text-2xl font-bold text-gray-800 mb-2">{{ title() }}</h2>
      <p class="text-gray-500 text-sm mb-8">{{ message() }}</p>
      <div class="flex flex-col gap-3">
        <button
          data-confirm
          (click)="confirm.emit()"
          class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-semibold text-lg
                 hover:bg-indigo-700 active:scale-95 transition-all"
        >
          Sí, soy yo 👁️
        </button>
        <button
          data-cancel
          (click)="cancel.emit()"
          class="w-full py-3 rounded-2xl text-gray-500 font-medium
                 hover:bg-gray-50 transition-colors text-sm"
        >
          No, me he equivocado
        </button>
      </div>
    </div>
  </div>
}
