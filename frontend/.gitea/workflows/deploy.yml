name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code
        run: |
          cd ~/apps/recursosutiles/frontend
          git pull

      - name: Rebuild and restart
        run: |
          cd ~/apps/recursosutiles
          sudo docker compose build recursosutiles-frontend
          sudo docker compose up -d recursosutiles-frontend
